services:
  - type: web
    name: pdf-rag-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: CORS_ORIGINS
        value: "*"
      - key: LLM_API_KEY
        sync: false
